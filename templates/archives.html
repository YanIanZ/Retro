{% extends "base.html" %}

{% block title %}Archives - {{ SITENAME }}{% endblock %}

{% block content %}
<div class="archives animate-in">
    <h1 class="post-title" style="text-align: center; margin-bottom: 3rem;">ARCHIVES_</h1>
    
    <div style="max-width: 800px; margin: 0 auto; background: var(--surface-color); padding: 2rem; border: 2px solid var(--accent-blue); box-shadow: 8px 8px 0px var(--accent-pink);">
        <dl style="display: flex; flex-direction: column; gap: 1rem; font-size: 1.5rem;">
        {% for article in dates %}
            <div style="display: flex; justify-content: space-between; border-bottom: 2px dashed var(--accent-pink); padding-bottom: 0.5rem;">
                <dt style="color: var(--text-secondary);">{{ article.locale_date }}</dt>
                <dd><a href="{{ SITEURL }}/{{ article.url }}" style="color: var(--text-primary);">{{ article.title }}</a></dd>
            </div>
        {% endfor %}
        </dl>
    </div>
</div>
{% endblock content %}
