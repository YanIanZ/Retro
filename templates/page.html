{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ SITENAME }}{% endblock %}

{% block content %}
<article class="single-post">
    <header class="post-header animate-in delay-1">
        <h1 class="post-title">{{ page.title }}</h1>
    </header>

    <div class="post-content animate-in delay-2">
        {{ page.content }}
    </div>
</article>
{% endblock content %}
